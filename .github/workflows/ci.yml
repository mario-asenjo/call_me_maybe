name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Sync dependencies
        run: uv sync

      - name: Run flake8
        run: uv run flake8 .

      - name: Run mypy
        run: >
          uv run mypy .
          --warn-return-any
          --warn-unused-ignores
          --ignore-missing-imports
          --disallow-untyped-defs
          --check-untyped-defs

      - name: Run tests if present
        run: |
          if [ -d tests ]; then
            uv run pytest -q
          else
            echo "No tests directory yet, skipping pytest."
          fi